<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Naam</title>
</head>
<body>

<h1>Voer je naam in</h1>

<input id="name">
<button onclick="join()">Join</button>

<p id="error"></p>

<script>

const allowedNames = [
"Jestin","Luca","Jules","Levi","Bink","Symen"
];

function join() {

    const name = document.getElementById("name").value.trim();
    const gameId = localStorage.getItem("gameId");
    const playerId = localStorage.getItem("playerId");

    if (!allowedNames.includes(name)) {
        document.getElementById("error").innerText = "Naam niet toegestaan";
        return;
    }

    fetch("/join", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            name,
            gameId,
            character: null,
            playerId
        })
    })
    .then(res => res.json())
    .then(data => {
        if (!data.success) {
            document.getElementById("error").innerText = data.error;
            return;
        }

        localStorage.setItem("playerName", name);
        window.location.href = "/player-step3.html";
    });
}

</script>

</body>
</html>
