<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Selecteren</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
    --gold: #f0c040;
    --dark: #0a0d14;
    --card: rgba(255,255,255,0.05);
    --card-border: rgba(255,255,255,0.09);
    --green: #4caf82;
    --red: #e05555;
    --blue: #5b9cf6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family:'Lato',sans-serif;
    background:var(--dark);
    color:white;
    min-height:100vh;
}
body::before {
    content:'';
    position:fixed; inset:0;
    background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(240,192,64,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(91,156,246,0.04) 0%, transparent 60%),
        url("https://www.efteling.com/nl/-/media/images/nieuw-events/winterefteling/sfeerbeeld/1024x576-baron-1898-winter-efteling-avond.jpg") center/cover no-repeat;
    opacity:.18; z-index:0; pointer-events:none;
}
body::after {
    content:'';
    position:fixed; inset:0;
    background:linear-gradient(180deg,rgba(10,13,20,0.6) 0%,rgba(10,13,20,0.97) 100%);
    z-index:0; pointer-events:none;
}

header {
    position:relative; z-index:10;
    padding:26px 40px 18px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--card-border);
}
.logo { font-family:'Cinzel',serif; font-size:20px; font-weight:900; color:var(--gold); letter-spacing:3px; text-transform:uppercase; }
.logo span { color:white; font-weight:700; }

.back-btn {
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:50px;
    padding:8px 18px;
    color:rgba(255,255,255,0.45);
    font-family:'Lato',sans-serif;
    font-size:12px; font-weight:700; letter-spacing:1px;
    cursor:pointer; text-decoration:none;
    transition:all .2s;
}
.back-btn:hover { color:white; border-color:rgba(255,255,255,0.28); }

main {
    position:relative; z-index:10;
    max-width:860px; margin:0 auto;
    padding:36px 40px 60px;
}

.page-title {
    font-family:'Cinzel',serif;
    font-size:26px; font-weight:900;
    color:white; margin-bottom:6px;
}
.page-sub {
    font-size:14px; color:rgba(255,255,255,0.38);
    margin-bottom:36px;
}

/* Nieuwe quiz knop */
.new-quiz-btn {
    display:flex; align-items:center; gap:14px;
    width:100%;
    padding:20px 24px;
    background:rgba(240,192,64,0.07);
    border:1px dashed rgba(240,192,64,0.35);
    border-radius:14px;
    color:var(--gold);
    font-family:'Lato',sans-serif;
    font-size:15px; font-weight:700;
    cursor:pointer; text-decoration:none;
    transition:background .2s, border-color .2s;
    margin-bottom:28px;
}
.new-quiz-btn:hover { background:rgba(240,192,64,0.13); border-color:rgba(240,192,64,0.6); }
.new-quiz-btn .plus { font-size:26px; line-height:1; }

/* Sectielabel */
.section-label {
    font-family:'Cinzel',serif;
    font-size:11px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase;
    color:rgba(255,255,255,0.28);
    margin-bottom:14px;
}

/* Quiz grid */
#quizGrid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:16px;
}

.quiz-card {
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:14px;
    padding:20px 20px 16px;
    cursor:pointer;
    transition:border-color .2s, background .2s;
    animation:fadeUp .3s ease both;
    position:relative;
}
.quiz-card:hover { border-color:rgba(255,255,255,0.22); background:rgba(255,255,255,0.07); }
.quiz-card.selected {
    border-color:var(--gold);
    background:rgba(240,192,64,0.07);
}

@keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
}

.quiz-naam {
    font-family:'Cinzel',serif;
    font-size:15px; font-weight:700;
    margin-bottom:8px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.quiz-meta {
    font-size:12px; color:rgba(255,255,255,0.35);
    display:flex; gap:14px; flex-wrap:wrap;
    margin-bottom:14px;
}
.quiz-meta span { display:flex; align-items:center; gap:4px; }

.quiz-card-btns {
    display:flex; gap:8px;
}
.btn-edit {
    flex:1; padding:8px;
    background:rgba(91,156,246,0.1);
    border:1px solid rgba(91,156,246,0.25);
    border-radius:8px;
    color:var(--blue);
    font-size:12px; font-weight:700;
    cursor:pointer; transition:background .2s;
}
.btn-edit:hover { background:rgba(91,156,246,0.2); }

.btn-delete {
    padding:8px 12px;
    background:rgba(224,85,85,0.08);
    border:1px solid rgba(224,85,85,0.2);
    border-radius:8px;
    color:var(--red);
    font-size:12px; cursor:pointer;
    transition:background .2s;
}
.btn-delete:hover { background:rgba(224,85,85,0.18); }

.selected-check {
    position:absolute; top:14px; right:14px;
    font-size:16px; display:none;
}
.quiz-card.selected .selected-check { display:block; }

/* Lege staat */
.empty-state {
    grid-column:1/-1;
    text-align:center; padding:50px 0;
    opacity:.28; font-size:14px;
}
.empty-icon { font-size:36px; margin-bottom:10px; }

/* Onderste balk */
.bottom-bar {
    position:fixed; bottom:0; left:0; right:0;
    z-index:20;
    background:rgba(10,13,20,0.95);
    border-top:1px solid var(--card-border);
    padding:16px 40px;
    display:flex; align-items:center; gap:20px;
}

.game-id-wrap { display:flex; align-items:center; gap:10px; flex:1; }
.game-id-label {
    font-size:11px; font-weight:700; letter-spacing:1.5px;
    text-transform:uppercase; color:rgba(255,255,255,0.35);
    white-space:nowrap;
}
.game-id-input {
    padding:11px 14px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:10px;
    color:white;
    font-family:'Lato',sans-serif;
    font-size:14px; outline:none;
    transition:border-color .2s;
    width:180px;
}
.game-id-input::placeholder { color:rgba(255,255,255,0.25); }
.game-id-input:focus { border-color:rgba(240,192,64,0.45); }

.start-btn {
    padding:12px 28px;
    background:var(--gold);
    color:#0a0d14;
    border:none; border-radius:10px;
    font-family:'Cinzel',serif;
    font-size:13px; font-weight:700;
    letter-spacing:2px;
    cursor:pointer; transition:opacity .2s, transform .1s;
    white-space:nowrap;
}
.start-btn:hover  { opacity:.87; }
.start-btn:active { transform:scale(.98); }
.start-btn:disabled { opacity:.35; cursor:not-allowed; }

.selected-label {
    font-size:13px; color:rgba(255,255,255,0.4);
    white-space:nowrap;
}
.selected-label.ok { color:var(--green); }

/* Spinner in knop */
.btn-spinner {
    display:inline-block;
    width:14px; height:14px;
    border:2px solid rgba(10,13,20,0.25);
    border-top-color:#0a0d14;
    border-radius:50%;
    animation:spin .7s linear infinite;
    vertical-align:middle; margin-right:6px;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<header>
    <div class="logo">Efteling <span>Quiz</span></div>
    <a href="/host-login" class="back-btn">← Uitloggen</a>
</header>

<main>
    <div class="page-title">Kies een quiz</div>
    <div class="page-sub">Selecteer een bestaande quiz of maak een nieuwe aan.</div>

    <a href="/quiz-editor" class="new-quiz-btn" target="_blank" rel="noopener">
        <span class="plus">＋</span>
        Nieuwe quiz maken
    </a>

    <div class="section-label">Opgeslagen quizzen</div>

    <div id="quizGrid">
        <div class="empty-state">
            <div class="empty-icon">📚</div>
            <div>Laden...</div>
        </div>
    </div>
</main>

<div class="bottom-bar">
    <div class="game-id-wrap">
        <span class="game-id-label">Game ID</span>
        <input class="game-id-input" id="gameIdInput" placeholder="bijv. efteling-2025" maxlength="30">
    </div>
    <span class="selected-label" id="selectedLabel">Geen quiz geselecteerd</span>
    <button class="start-btn" id="startBtn" disabled onclick="startQuiz()">STARTEN</button>
</div>

<script>
let selectedQuizId   = null;
let selectedQuizNaam = null;

function tijdGeleden(datum) {
    const nu  = Date.now();
    const dan = new Date(datum).getTime();
    const sec = Math.floor((nu - dan) / 1000);
    if (sec < 60)  return "zojuist";
    if (sec < 3600) return Math.floor(sec/60) + " min geleden";
    if (sec < 86400) return Math.floor(sec/3600) + " uur geleden";
    return Math.floor(sec/86400) + " dagen geleden";
}

function laadQuizzen() {
    fetch("/api/quizzen", { credentials: "include" })
        .then(r => r.json())
        .then(data => {
            const grid = document.getElementById("quizGrid");
            const quizzen = data.quizzen || [];

            if (quizzen.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📚</div>
                        <div>Nog geen quizzen. Maak er een aan!</div>
                    </div>`;
                return;
            }

            grid.innerHTML = "";
            quizzen.forEach((q, i) => {
                const card = document.createElement("div");
                card.className = "quiz-card";
                card.style.animationDelay = (i * 0.05) + "s";
                card.dataset.id = q._id;
                card.innerHTML = `
                    <span class="selected-check">✅</span>
                    <div class="quiz-naam">${q.naam}</div>
                    <div class="quiz-meta">
                        <span>📝 ${q.vragen.length} vrag${q.vragen.length === 1 ? "e" : "en"}</span>
                        <span>🕓 ${tijdGeleden(q.bijgewerkt)}</span>
                    </div>
                    <div class="quiz-card-btns">
                        <button class="btn-edit" onclick="bewerkQuiz('${q._id}', event)">✏️ Bewerken</button>
                        <button class="btn-delete" onclick="verwijderQuiz('${q._id}', event)">🗑</button>
                    </div>
                `;
                card.addEventListener("click", () => selecteerQuiz(q._id, q.naam, card));
                grid.appendChild(card);
            });
        })
        .catch(() => {
            document.getElementById("quizGrid").innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">⚠️</div>
                    <div>Kon quizzen niet laden</div>
                </div>`;
        });
}

function selecteerQuiz(id, naam, card) {
    // Deselecteer alle kaarten
    document.querySelectorAll(".quiz-card").forEach(c => c.classList.remove("selected"));
    card.classList.add("selected");
    selectedQuizId   = id;
    selectedQuizNaam = naam;

    const label = document.getElementById("selectedLabel");
    label.textContent = "✅ " + naam;
    label.className   = "selected-label ok";
    updateStartBtn();
}

function bewerkQuiz(id, e) {
    e.stopPropagation();
    window.open("/quiz-editor?id=" + id, "_blank");
}

function verwijderQuiz(id, e) {
    e.stopPropagation();
    if (!confirm("Quiz verwijderen?")) return;
    fetch("/api/quizzen/" + id, { method: "DELETE", credentials: "include" })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                if (selectedQuizId === id) {
                    selectedQuizId = null;
                    document.getElementById("selectedLabel").textContent = "Geen quiz geselecteerd";
                    document.getElementById("selectedLabel").className   = "selected-label";
                    updateStartBtn();
                }
                laadQuizzen();
            }
        });
}

function updateStartBtn() {
    const gameId = document.getElementById("gameIdInput").value.trim();
    document.getElementById("startBtn").disabled = !(selectedQuizId && gameId);
}

document.getElementById("gameIdInput").addEventListener("input", updateStartBtn);

function startQuiz() {
    const gameId = document.getElementById("gameIdInput").value.trim();
    if (!gameId || !selectedQuizId) return;

    const btn = document.getElementById("startBtn");
    btn.disabled = true;
    btn.innerHTML = `<span class="btn-spinner"></span>STARTEN...`;

    fetch("/api/start-quiz", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ gameId, quizId: selectedQuizId })
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) {
            alert(data.error);
            btn.disabled = false;
            btn.textContent = "STARTEN";
            return;
        }
        window.location.href = "/host";
    })
    .catch(() => {
        alert("Server niet bereikbaar");
        btn.disabled = false;
        btn.textContent = "STARTEN";
    });
}

window.addEventListener("load", laadQuizzen);
</script>
</body>
</html>
