<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
    padding:20px;
}

#reader {
    width:300px;
    margin:30px auto;
}

#helpBtn {
    position:fixed;
    left:20px;
    bottom:20px;
    z-index:9999;
    padding:12px 20px;
    font-size:1em;
    border:none;
    border-radius:8px;
    background:#f59e0b;
    color:black;
    cursor:pointer;
}

#helpOverlay {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    color:white;
    font-size:2em;
    text-align:center;
    padding-top:20%;
    z-index:10000;
}

#helpOverlay button {
    margin-top:20px;
    padding:10px 20px;
    font-size:0.5em;
}
</style>
</head>
<body>

<h2>Scan je QR-code</h2>

<div id="reader"></div>

<button id="helpBtn">Vraag om hulp</button>

<div id="helpOverlay">
    <p>Hulp is onderweg...</p>
    <button onclick="closeHelp()">Annuleer</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// QR scan succesvol
function onScanSuccess(decodedText) {
    window.location.href = decodedText;
}

// QR scanner starten
const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
    { facingMode: "environment" },
    {
        fps: 10,
        qrbox: 250
    },
    onScanSuccess
).catch(err => {
    console.error("QR scanner fout:", err);
});

// Hulp knop
document.getElementById("helpBtn").onclick = ()=> {
    document.getElementById("helpOverlay").style.display="block";

    socket.emit("helpRequest", {
        name: "Niet bekend"
    });
};

function closeHelp() {
    document.getElementById("helpOverlay").style.display="none";
}
</script>

</body>
</html>
