<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>
<link rel="stylesheet" href="/style.css">
<style>
#galleryOverlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: white;
    overflow-y: auto;
    z-index: 9999;
}
#galleryHeader {
    height: 60px;
    background: white;
    border-bottom: 2px solid #eee;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 10;
}
#closeGallery {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
}
#galleryGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
    padding: 20px;
}
.character-card {
    background: white;
    border-radius: 20px;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.character-card:hover { transform: scale(1.05); }
.character-card img {
    width: 100%;
    height: 110px;
    object-fit: contain;
}
.character-card p {
    color: black;
    font-weight: bold;
    font-size: 13px;
    margin-top: 6px;
}
.character-card.disabled {
    opacity: 0.4;
    pointer-events: none;
    filter: grayscale(100%);
}
#chosenImage {
    width: 130px;
    display: block;
    margin: auto;
}
#helpOverlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 1100;
    color: white;
    font-size: 2em;
    text-align: center;
    padding-top: 20%;
}
#helpOverlay button {
    margin-top: 20px;
    font-size: 0.5em;
    padding: 10px 20px;
}
#helpBtn {
    position: fixed;
    left: 20px;
    bottom: 20px;
    z-index: 1200;
    padding: 12px 20px;
    font-size: 1em;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}
</style>
</head>
<body>

<h2>✔ Welkom in de quiz!</h2>
<p>Jouw naam en personage:</p>

<div>
    <img id="chosenImage" alt="Personage">
    <p id="chosenName"></p>
</div>

<button onclick="openGallery()">Kies / wijzig je personage</button>

<div id="galleryOverlay">
    <div id="galleryHeader">
        <button id="closeGallery">✖</button>
    </div>
    <div id="galleryGrid"></div>
</div>

<button id="helpBtn">Vraag om hulp</button>
<div id="helpOverlay">
    <p>Hulp is onderweg...</p>
    <button onclick="closeHelp()">Annuleer</button>
</div>

<script src="/socket.io/socket.io.js"></script>

let playerId   = localStorage.getItem("playerId");
if (!playerId) {
    playerId = "pid_" + Math.random().toString(36).slice(2);
    localStorage.setItem("playerId", playerId);
}

// (player-step3 wordt altijd bereikt via redirect, dus naam+gameId zijn genoeg)
if (!name || !gameId) {
    document.body.innerHTML = `
        <div style="text-align:center; margin-top:100px;">

// --- Personage tonen ---
function setCharacter(char) {
    document.getElementById("chosenImage").src = char.img;
    document.getElementById("chosenName").innerText = char.name;
}

// --- Galerij openen/sluiten ---
function openGallery() {
    document.getElementById("galleryOverlay").style.display = "block";
    loadGallery();
}
function closeGallery() {
    document.getElementById("galleryOverlay").style.display = "none";
}

function loadGallery() {
    fetch("/scores-full")
        .then(res => res.json())
        .then(data => {
            const grid = document.getElementById("galleryGrid");
            grid.innerHTML = "";

            const takenCharacters = (data.players || []).map(p => p.character);
            const myCharacter = document.getElementById("chosenName").innerText;

            characters.forEach(c => {
                const card = document.createElement("div");
                card.className = "character-card";
                card.innerHTML = `<img src="${c.img}" alt="${c.name}"><p>${c.name}</p>`;

                // BUG FIX: eigen huidige personage is altijd klikbaar, ook al staat het in takenCharacters
                if (takenCharacters.includes(c.name) && c.name !== myCharacter) {
                    card.classList.add("disabled");
                } else {
                    card.onclick = () => chooseCharacter(c);
                }

                grid.appendChild(card);
            });
        });
}

// --- Personage kiezen ---
function chooseCharacter(c) {
    fetch("/join", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            gameId:    gameId,
            name:      name,
            character: c.name,
            playerId:  playerId
        })
    })
    .then(res => res.json())
    .then(data => {
        if (!data.success) { alert(data.error); return; }
        // BUG FIX: gekozen personage opslaan in localStorage zodat het na refresh terug is
        localStorage.setItem("chosenCharacter", JSON.stringify(c));
        setCharacter(c);
        closeGallery();
    });
}

// --- Hulp knop ---
document.getElementById("helpBtn").onclick = () => {
    document.getElementById("helpOverlay").style.display = "block";
    socket.emit("helpRequest", { name: name || "Niet bekend" });
};
function closeHelp() {
    document.getElementById("helpOverlay").style.display = "none";
}

// --- Sluit galerij knop ---
document.getElementById("closeGallery").addEventListener("click", closeGallery);

// --- Socket: galerij herladen als iemand anders een personage kiest ---
socket.on("gameUpdate", (payload) => {
    if (payload.type === "playersUpdate") loadGallery();
});

// --- Start ---
window.addEventListener("load", () => {
    // Opgeslagen personage terugzetten, anders leeg laten (geen willekeurig)
    const saved = localStorage.getItem("chosenCharacter");
    if (saved) {
        try {
            setCharacter(JSON.parse(saved));
        } catch (e) { /* negeer */ }
    }

    // Meteen registreren bij de server zodra de pagina laadt,
    // zodat de speler direct op het dashboard en leaderboard verschijnt
    // zonder dat ze al een personage hoeven te kiezen.
    if (name && gameId) {
        const savedChar = saved ? (() => { try { return JSON.parse(saved); } catch(e) { return null; } })() : null;
        fetch("/join", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                gameId:    gameId,
                name:      name,
                character: savedChar ? savedChar.name : null,
                playerId:  playerId
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) console.warn("Join fout:", data.error);
        })
        .catch(err => console.warn("Join mislukt:", err));
    }
});
</script>

</html>
