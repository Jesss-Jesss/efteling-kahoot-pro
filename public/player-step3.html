<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Player</title>
<link rel="stylesheet" href="/style.css">
<style>
/* ======= RESET & BASE ======= */
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
    --gold: #f0c040;
    --dark: #0a0d14;
    --green: #4caf82;
    --red: #e05555;
    --blue: #5b9cf6;
    --card: rgba(255,255,255,0.05);
}

/* ======= GALLERY & HELP (origineel, ongewijzigd) ======= */
#galleryOverlay {
    display: none; position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: white; overflow-y: auto; z-index: 9999;
}
#galleryHeader {
    height: 60px; background: white; border-bottom: 2px solid #eee;
    display: flex; justify-content: flex-end; align-items: center;
    padding: 0 20px; position: sticky; top: 0; z-index: 10;
}
#closeGallery { background: none; border: none; font-size: 24px; cursor: pointer; }
#galleryGrid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px; padding: 20px;
}
.character-card {
    background: white; border-radius: 20px; padding: 10px;
    text-align: center; cursor: pointer; transition: 0.2s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.character-card:hover { transform: scale(1.05); }
.character-card img { width: 100%; height: 110px; object-fit: contain; }
.character-card p { color: black; font-weight: bold; font-size: 13px; margin-top: 6px; }
.character-card.disabled { opacity: 0.4; pointer-events: none; filter: grayscale(100%); }
#chosenImage { width: 130px; display: block; margin: auto; }
#helpOverlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); z-index: 1100; color: white;
    font-size: 2em; text-align: center; padding-top: 20%;
}
#helpOverlay button { margin-top: 20px; font-size: 0.5em; padding: 10px 20px; }
#helpBtn {
    position: fixed; left: 20px; bottom: 20px; z-index: 1200;
    padding: 12px 20px; font-size: 1em; border: none; border-radius: 8px;
    background: #3b82f6; color: white; cursor: pointer;
}

/* ======= QUIZ OVERLAY ======= */
#quizOverlay {
    display: none;
    position: fixed; inset: 0; z-index: 2000;
    background: var(--dark);
    font-family: 'Lato', 'Arial', sans-serif;
    color: white;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
}
#quizOverlay.active { display: flex; }

/* --- WACHT scherm (in quiz overlay) --- */
#qWacht {
    display: flex; flex-direction: column; align-items: center;
    gap: 14px; text-align: center;
}
.q-logo {
    font-family: 'Cinzel', 'Georgia', serif;
    font-size: 18px; font-weight: 900;
    color: var(--gold); letter-spacing: 3px; text-transform: uppercase;
}
.q-naam { font-size: 26px; font-weight: 900; }
.q-sub { font-size: 13px; color: rgba(255,255,255,0.4); line-height: 1.6; }
.dot-rij { display: flex; gap: 6px; justify-content: center; }
.dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gold); animation: dotPop 1.4s ease infinite;
}
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes dotPop { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

/* --- VRAAG scherm --- */
#qVraag {
    display: none; flex-direction: column;
    width: 100%; max-width: 460px; gap: 14px;
}
.q-header { display: flex; align-items: center; justify-content: space-between; }
.q-nr-badge {
    font-size: 11px; letter-spacing: 2px;
    color: rgba(255,255,255,0.35); text-transform: uppercase;
    font-family: 'Cinzel', serif;
}
.timer-wrap { position: relative; width: 52px; height: 52px; }
.timer-wrap svg { transform: rotate(-90deg); }
.t-bg { fill:none; stroke:rgba(255,255,255,.08); stroke-width:3; }
.t-fill {
    fill:none; stroke:var(--gold); stroke-width:3;
    stroke-linecap:round; stroke-dasharray:126; stroke-dashoffset:0;
    transition:stroke-dashoffset 1s linear, stroke .3s;
}
.t-num {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:900; color:var(--gold);
}
.q-tekst {
    font-size:19px; font-weight:700; line-height:1.45;
    text-align:center; padding:6px 0;
}
.q-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.q-btn {
    position:relative; border:none; border-radius:14px;
    padding:20px 12px; font-size:15px; font-weight:700; color:white;
    cursor:pointer; text-align:center; line-height:1.3;
    transition:transform .12s, opacity .2s, filter .2s, box-shadow .15s;
    min-height:82px;
    display:flex; align-items:center; justify-content:center;
    font-family: inherit;
}
.q-btn:active { transform:scale(.95); }
.q-btn[data-i="0"] { background:#e05555; }
.q-btn[data-i="1"] { background:#4a90d9; }
.q-btn[data-i="2"] { background:#4caf82; }
.q-btn[data-i="3"] { background:#e0952a; }
.q-btn.gekozen { box-shadow:0 0 0 3px white; transform:scale(.97); }
.q-btn.niet-gekozen { opacity:.3; filter:saturate(.2); }
.q-klaar {
    display:none; align-items:center; justify-content:center; gap:10px;
    background:rgba(76,175,130,.12); border:1px solid rgba(76,175,130,.3);
    border-radius:12px; padding:14px;
    font-weight:700; font-size:14px; color:var(--green);
}

/* --- RESULTATEN scherm --- */
#qResultaten {
    display:none; flex-direction:column;
    width:100%; max-width:460px; gap:12px; align-items:center;
}
.res-icon { font-size:52px; line-height:1; animation:popIn .4s cubic-bezier(.22,.61,.36,1) both; }
@keyframes popIn { from{opacity:0;transform:scale(.5)} to{opacity:1;transform:scale(1)} }
.res-label {
    font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px;
    color:rgba(255,255,255,.35); text-transform:uppercase;
}
.res-winst {
    font-size:36px; font-weight:900; color:var(--gold);
    animation:fadeUp .4s .1s ease both;
}
.res-totaal { font-size:13px; color:rgba(255,255,255,.35); }
.res-antw-lijst { width:100%; display:flex; flex-direction:column; gap:8px; margin-top:4px; }
.res-antw-rij { display:flex; align-items:center; gap:10px; }
.res-antw-tekst { font-size:12px; color:rgba(255,255,255,.55); min-width:90px; max-width:110px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.res-antw-balk-wrap { flex:1; height:28px; background:rgba(255,255,255,.06); border-radius:7px; overflow:hidden; }
.res-antw-balk {
    height:100%; border-radius:7px;
    display:flex; align-items:center; padding:0 8px;
    font-size:12px; font-weight:700;
    transition:width .7s cubic-bezier(.22,.61,.36,1);
}
.balk-goed { background:rgba(76,175,130,.5); color:#a3f0c8; }
.balk-fout { background:rgba(224,85,85,.4); color:#f0a3a3; }
.res-antw-pct { font-size:12px; font-weight:700; color:rgba(255,255,255,.35); min-width:32px; text-align:right; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* --- TUSSENSTAND scherm --- */
#qTussenstand {
    display:none; flex-direction:column;
    width:100%; max-width:460px; gap:10px; align-items:center;
}
.ts-titel {
    font-family:'Cinzel',serif; font-size:13px; letter-spacing:2px;
    color:rgba(255,255,255,.4); text-transform:uppercase; margin-bottom:4px;
}
.ts-rij {
    width:100%; display:flex; align-items:center; gap:12px;
    background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07);
    border-radius:12px; padding:12px 16px;
    animation:fadeUp .3s ease both;
}
.ts-rij.eigen { background:rgba(240,192,64,.08); border-color:rgba(240,192,64,.25); }
.ts-rang { font-size:16px; font-weight:900; min-width:28px; text-align:center; color:rgba(255,255,255,.3); }
.ts-rang.r1 { color:#ffd700; }
.ts-rang.r2 { color:#c0c0c0; }
.ts-rang.r3 { color:#cd7f32; }
.ts-naam { flex:1; font-weight:700; font-size:15px; }
.ts-score { font-weight:900; font-size:15px; color:var(--gold); }
.ts-delta { font-size:11px; color:var(--green); margin-left:4px; }

/* --- EINDPODIUM scherm --- */
#qEindpodium {
    display:none; flex-direction:column;
    width:100%; max-width:500px; gap:0; align-items:center;
}
.ep-titel {
    font-family:'Cinzel',serif; font-size:20px; font-weight:900;
    color:var(--gold); letter-spacing:3px; text-transform:uppercase;
    margin-bottom:6px; animation:fadeUp .4s ease both;
}
.ep-subtitel {
    font-size:12px; color:rgba(255,255,255,.3); letter-spacing:1px;
    margin-bottom:24px; animation:fadeUp .4s .05s ease both;
}

/* Olympisch podium */
.ep-podium-wrap {
    display:flex; align-items:flex-end; justify-content:center;
    gap:8px; width:100%; padding:0 10px;
}
.ep-blok {
    display:flex; flex-direction:column; align-items:center;
    flex:1; animation:riseUp .6s cubic-bezier(.22,.61,.36,1) both;
}
.ep-blok:nth-child(1) { animation-delay:.35s; } /* #2 links */
.ep-blok:nth-child(2) { animation-delay:.1s;  } /* #1 midden */
.ep-blok:nth-child(3) { animation-delay:.55s; } /* #3 rechts */

@keyframes riseUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }

.ep-avatar {
    width:56px; height:56px; border-radius:12px;
    object-fit:contain; background:rgba(255,255,255,.07);
    margin-bottom:6px; border:2px solid rgba(255,255,255,.1);
}
.ep-avatar-placeholder {
    width:56px; height:56px; border-radius:12px;
    background:rgba(255,255,255,.07); display:flex; align-items:center;
    justify-content:center; font-size:24px; margin-bottom:6px;
    border:2px solid rgba(255,255,255,.1);
}
.ep-naam { font-size:13px; font-weight:700; text-align:center; margin-bottom:4px; }
.ep-score-badge {
    font-size:12px; font-weight:900; color:var(--gold);
    margin-bottom:6px;
}
.ep-blok-sokkel {
    width:100%; border-radius:8px 8px 0 0;
    display:flex; align-items:center; justify-content:center;
    font-family:'Cinzel',serif; font-size:28px; font-weight:900;
    padding-top:12px;
}
/* Hoogtes */
.ep-blok.pos-1 .ep-blok-sokkel { height:110px; background:linear-gradient(160deg,#ffd700,#b8860b); color:#5c3d00; }
.ep-blok.pos-2 .ep-blok-sokkel { height:80px;  background:linear-gradient(160deg,#e0e0e0,#9e9e9e); color:#333; }
.ep-blok.pos-3 .ep-blok-sokkel { height:56px;  background:linear-gradient(160deg,#cd7f32,#8b4513); color:#3d1f00; }

/* Rest van spelers */
.ep-rest {
    width:100%; margin-top:16px;
    display:flex; flex-direction:column; gap:6px;
}
.ep-rest-rij {
    display:flex; align-items:center; gap:12px;
    background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06);
    border-radius:10px; padding:10px 14px;
    animation:fadeUp .3s ease both;
}
.ep-rest-rang { font-size:14px; font-weight:700; color:rgba(255,255,255,.3); min-width:24px; }
.ep-rest-naam { flex:1; font-weight:700; font-size:14px; }
.ep-rest-score { font-weight:900; font-size:14px; color:var(--gold); }
</style>
</head>

<!-- ===== ORIGINELE LOBBY INHOUD ===== -->
<h2>✔ Welkom in de quiz!</h2>
<p>Jouw naam en personage:</p>
<div>
    <img id="chosenImage" alt="Personage">
    <p id="chosenName"></p>
</div>
<button onclick="openGallery()">Kies / wijzig je personage</button>

<div id="galleryOverlay">
    <div id="galleryHeader">
        <button id="closeGallery">✖</button>
    </div>
    <div id="galleryGrid"></div>
</div>

<button id="helpBtn">Vraag om hulp</button>
<div id="helpOverlay">
    <p>Hulp is onderweg...</p>
    <button onclick="closeHelp()">Annuleer</button>
</div>

<!-- ===== QUIZ OVERLAY (over alles heen) ===== -->
<div id="quizOverlay">

            <span class="q-nr-badge" id="qNrBadge">Vraag 1 / 1</span>

        <div class="q-klaar" id="qKlaar">✓ &nbsp;Antwoord verzonden — wacht op resultaten</div>
    </div>

    <!-- RESULTATEN -->
<div id="qResultaten">
    <div class="res-icon" id="resIcon">🎯</div>
    <div class="res-label">Jouw resultaat</div>
    <div class="res-winst" id="resWinst">+0</div>

</div>

    <!-- TUSSENSTAND -->
    <div id="qTussenstand">
        <div class="ts-titel">📊 Tussenstand</div>
        <div id="tsLijst"></div>
    </div>

    <!-- EINDPODIUM -->
    <div id="qEindpodium">
        <div class="ep-titel">🏆 Eindstand</div>
        <div class="ep-subtitel">Gefeliciteerd aan iedereen!</div>
        <div class="ep-podium-wrap" id="epPodium"></div>
        <div class="ep-rest" id="epRest"></div>
    </div>

</div><!-- /quizOverlay -->

const characterMap = {};
characters.forEach(c => { characterMap[c.name] = c.img; });

/* ============================================================
   GALLERY & HELP (origineel)
   ============================================================ */
function setCharacter(char) {
    document.getElementById("chosenImage").src = char.img;
    document.getElementById("chosenName").innerText = char.name;
}
function openGallery() { document.getElementById("galleryOverlay").style.display = "block"; loadGallery(); }
function closeGallery() { document.getElementById("galleryOverlay").style.display = "none"; }

function loadGallery() {
    fetch("/scores-full").then(r=>r.json()).then(data => {
        const grid = document.getElementById("galleryGrid");
        grid.innerHTML = "";
        const taken = (data.players||[]).map(p=>p.character);
        const mine  = document.getElementById("chosenName").innerText;
        characters.forEach(c => {
            const card = document.createElement("div");
            card.className = "character-card";
            card.innerHTML = `<img src="${c.img}" alt="${c.name}"><p>${c.name}</p>`;
            if (taken.includes(c.name) && c.name !== mine) card.classList.add("disabled");
            else card.onclick = () => chooseCharacter(c);
            grid.appendChild(card);
        });
    });
}
function chooseCharacter(c) {
    fetch("/join", { method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({gameId, name, character:c.name, playerId}) })
    .then(r=>r.json()).then(data => {
        if (!data.success) { alert(data.error); return; }
        localStorage.setItem("chosenCharacter", JSON.stringify(c));
        setCharacter(c); closeGallery();
    });
}

document.getElementById("helpBtn").onclick = () => {
    document.getElementById("helpOverlay").style.display = "block";
    socket.emit("helpRequest", { name: name || "Niet bekend" });
};
function closeHelp() { document.getElementById("helpOverlay").style.display = "none"; }
document.getElementById("closeGallery").addEventListener("click", closeGallery);

/* ============================================================
   QUIZ STATE
   ============================================================ */
let timerInterval = null;
let heeftGeantwoord = false;
let vorigeScore = 0;
const overlay = document.getElementById("quizOverlay");

function quizScherm(id) {
    // id = null → overlay verbergen (lobby)
    if (!id) { overlay.classList.remove("active"); return; }
    overlay.classList.add("active");
    ["qWacht","qVraag","qResultaten","qTussenstand","qEindpodium"].forEach(s => {
        document.getElementById(s).style.display = "none";
    });
    document.getElementById(id).style.display = "flex";
}

/* ---- WACHT ---- */
function toonWacht() { quizScherm("qWacht"); clearInterval(timerInterval); }

/* ---- VRAAG ---- */
function toonVraag(p) {
    heeftGeantwoord = false;
    quizScherm("qVraag");

    document.getElementById("qNrBadge").textContent = "Vraag " + (p.huidigeVraag+1) + " / " + p.totaalVragen;
    document.getElementById("qTekst").textContent = p.vraag;

    const grid = document.getElementById("qGrid");
    grid.innerHTML = "";
    p.antwoorden.forEach((a, i) => {
        const btn = document.createElement("button");
        btn.className = "q-btn"; btn.dataset.i = i;
        btn.textContent = a.tekst;
        btn.onclick = () => stuurAntwoord(i);
        grid.appendChild(btn);
    });

    document.getElementById("qKlaar").style.display = "none";
    grid.style.display = "grid";

    startTimer(p.tijdlimiet || 20, p.vraagStartTijd || Date.now());
}

function startTimer(limiet, startMs) {
    clearInterval(timerInterval);
    const ring = document.getElementById("tRing");
    const num  = document.getElementById("tNum");
    const omtrek = 2 * Math.PI * 20;

    function tick() {
        const verstreken = (Date.now() - startMs) / 1000;
        const over = Math.max(0, limiet - verstreken);
        const frac = over / limiet;
        num.textContent = Math.ceil(over);
        ring.style.strokeDashoffset = omtrek * (1 - frac);
        ring.style.stroke = over <= 5 ? "#e05555" : over <= 10 ? "#f0a030" : "var(--gold)";
        if (over <= 0) clearInterval(timerInterval);
    }
    tick();
    timerInterval = setInterval(tick, 250);
}

function stuurAntwoord(index) {
    if (heeftGeantwoord) return;
    heeftGeantwoord = true;
    clearInterval(timerInterval);
    socket.emit("antwoord", { name, antwoordIndex: index });

    document.querySelectorAll(".q-btn").forEach(b => {
        b.classList.add(parseInt(b.dataset.i) === index ? "gekozen" : "niet-gekozen");
        b.style.pointerEvents = "none";
    });
    document.getElementById("qGrid").style.pointerEvents = "none";
    document.getElementById("qKlaar").style.display = "flex";
}

/* ---- RESULTATEN ---- */
function toonResultaten(p) {
    clearInterval(timerInterval);
    quizScherm("qResultaten");

    const scores = p.scores || {};
    const huidig = scores[name] || 0;
    const winst  = huidig - vorigeScore;

    document.getElementById("resIcon").textContent = winst > 0 ? "🎉" : "😅";
    document.getElementById("resWinst").textContent = (winst > 0 ? "+" : "") + winst.toLocaleString("nl-NL") + " punten";
    document.getElementById("resTotaal").textContent = "Totaal: " + huidig.toLocaleString("nl-NL") + " punten";

    // Antwoord balkjes
    const lijst = document.getElementById("resAntwLijst");
    lijst.innerHTML = "";
    if (p.resultaten && p.resultaten.antwoorden) {
        p.resultaten.antwoorden.forEach(a => {
            const rij = document.createElement("div");
            rij.className = "res-antw-rij";
            rij.innerHTML = `
                <div class="res-antw-tekst">${a.tekst}</div>
                <div class="res-antw-balk-wrap">
                    <div class="res-antw-balk ${a.correct ? 'balk-goed':'balk-fout'}"
                         style="width:${a.procent}%">
                        ${a.procent > 20 ? a.aantal + 'x' : ''}
                    </div>
                </div>
                <div class="res-antw-pct">${a.procent}%</div>
            `;
            lijst.appendChild(rij);
        });
    }

    vorigeScore = huidig;
}

/* ---- TUSSENSTAND (podium tussendoor, alle spelers) ---- */
function toonTussenstand(p) {
    quizScherm("qTussenstand");
    const lijst = document.getElementById("tsLijst");
    lijst.innerHTML = "";
    (p.podium || []).forEach((speler, i) => {
        const rij = document.createElement("div");
        rij.className = "ts-rij" + (speler.name === name ? " eigen" : "");
        rij.style.animationDelay = (i * 0.07) + "s";
        const symbool = i===0 ? "🥇" : i===1 ? "🥈" : i===2 ? "🥉" : (i+1);
        const rankCls = i===0?"r1":i===1?"r2":i===2?"r3":"";
        rij.innerHTML = `
            <div class="ts-rang ${rankCls}">${symbool}</div>
            <div class="ts-naam">${speler.name}${speler.name===name?" (jij)":""}</div>
            <div class="ts-score">${speler.score.toLocaleString("nl-NL")}</div>
        `;
        lijst.appendChild(rij);
    });
}

/* ---- EINDPODIUM (olympisch, top 3 groot + rest eronder) ---- */
function toonEindpodium(p) {
    quizScherm("qEindpodium");
    const gesorteerd = p.podium || [];

    // Olympische volgorde: index 1 = #2 links, index 0 = #1 midden, index 2 = #3 rechts
    const podiumVolgorde = [gesorteerd[1], gesorteerd[0], gesorteerd[2]].filter(Boolean);
    const posCls = ["pos-2","pos-1","pos-3"];

    const podiumEl = document.getElementById("epPodium");
    podiumEl.innerHTML = "";

    podiumVolgorde.forEach((speler, vi) => {
        const echteRank = gesorteerd.indexOf(speler); // 0-based
        const imgUrl = speler.character ? characterMap[speler.character] : null;
        const blok = document.createElement("div");
        blok.className = "ep-blok " + posCls[vi];

        blok.innerHTML = `
            ${imgUrl
                ? `<img class="ep-avatar" src="${imgUrl}" alt="${speler.character}">`
                : `<div class="ep-avatar-placeholder">👤</div>`}
            <div class="ep-naam">${speler.name}${speler.name===name?" ★":""}</div>
            <div class="ep-score-badge">${speler.score.toLocaleString("nl-NL")} pts</div>
            <div class="ep-blok-sokkel">${echteRank===0?"1":echteRank===1?"2":"3"}</div>
        `;
        podiumEl.appendChild(blok);
    });

    // Rest (4e, 5e, 6e)
    const restEl = document.getElementById("epRest");
    restEl.innerHTML = "";
    gesorteerd.slice(3).forEach((speler, i) => {
        const rij = document.createElement("div");
        rij.className = "ep-rest-rij";
        rij.style.animationDelay = (i * 0.08) + "s";
        rij.innerHTML = `
            <div class="ep-rest-rang">${i+4}</div>
            <div class="ep-rest-naam">${speler.name}${speler.name===name?" (jij)":""}</div>
            <div class="ep-rest-score">${speler.score.toLocaleString("nl-NL")} pts</div>
        `;
        restEl.appendChild(rij);
    });
}

/* ============================================================
   SOCKET EVENTS
   ============================================================ */
socket.on("faseUpdate", p => {
    const f = p.fase;
    if (f === "lobby")        quizScherm(null);
    else if (f === "vraag")   toonVraag(p);
    else if (f === "resultaten") toonResultaten(p);
    else if (f === "podium")  toonTussenstand(p);
    else if (f === "eindpodium") toonEindpodium(p);
});

socket.on("gameUpdate", payload => {
    if (payload.type === "playersUpdate") loadGallery();
});

/* ============================================================
   RECONNECT: herstel huidige staat
   ============================================================ */
fetch("/api/game-state").then(r=>r.json()).then(state => {
    if (!state.fase || state.fase === "lobby") return;
    vorigeScore = (state.scores && state.scores[name]) || 0;
    if      (state.fase === "vraag")      toonVraag(state);
    else if (state.fase === "resultaten") toonResultaten(state);
    else if (state.fase === "podium")     toonTussenstand(state);
    else if (state.fase === "eindpodium") toonEindpodium(state);
}).catch(()=>{});

/* ============================================================
   START (originele join-logica ongewijzigd)
   ============================================================ */
window.addEventListener("load", () => {
    const saved = localStorage.getItem("chosenCharacter");
    if (saved) { try { setCharacter(JSON.parse(saved)); } catch(e){} }

    if (name && gameId) {
        const savedChar = saved ? (() => { try { return JSON.parse(saved); } catch(e){ return null; } })() : null;
        fetch("/join", { method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({gameId, name, character: savedChar ? savedChar.name : null, playerId})
        })
        .then(r=>r.json())
        .then(data => { if (data.error) console.warn("Join fout:", data.error); })
        .catch(err => console.warn("Join mislukt:", err));
    }
});
</script>
