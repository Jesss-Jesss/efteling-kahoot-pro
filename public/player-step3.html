<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lobby</title>
<script src="/socket.io/socket.io.js"></script>
</head>
<body>

<h1>Lobby</h1>

<ul id="players"></ul>

<script>

const socket = io();

socket.on("gameUpdate", (game) => {

    const list = document.getElementById("players");
    list.innerHTML = "";

    game.players.forEach(p => {
        const li = document.createElement("li");
        li.innerText = p.name;
        list.appendChild(li);
    });

});

</script>

</body>
</html>
