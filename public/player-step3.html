<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>
<link rel="stylesheet" href="/style.css">
<style>
/* Gallery overlay */
#galleryOverlay {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.8);
    z-index:1000;
}
#galleryContent {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100%;
}
.character-card {
    margin:10px;
    text-align:center;
    cursor:pointer;
    border:2px solid transparent;
}
.character-card.disabled {
    opacity:0.4;
    cursor:not-allowed;
}
.character-card img {
    width:120px;
    height:auto;
}
#chosenImage {
    width:130px;
    display:block;
    margin:auto;
}
#helpOverlay {
    display:none;
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.7);
    z-index:1100;
    color:white;
    font-size:2em;
    text-align:center;
    padding-top:20%;
}
#helpOverlay button {
    margin-top:20px;
    font-size:0.5em;
    padding:10px 20px;
}
#helpBtn {
    position:fixed;
    left:20px;
    bottom:20px;
    z-index:1200;
    padding:12px 20px;
    font-size:1em;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<h2>✔ Welkom in de quiz!</h2>
<p>Jouw naam en personage:</p>

<div>
    <img id="chosenImage">
    <p id="chosenName"></p>
</div>

<button onclick="openGallery()">Kies / wijzig je personage</button>

<div id="galleryOverlay">
    <div id="galleryContent">
        <div id="galleryGrid"></div>
    </div>
    <button id="closeGallery">✖ Sluit</button>
</div>

<button id="helpBtn">Vraag om hulp</button>
<div id="helpOverlay">
    <p>Hulp is onderweg...</p>
    <button onclick="closeHelp()">Annuleer</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

// QR-code/gameId ophalen
let urlParts = window.location.pathname.split('/');
let joinId = urlParts[2] || null; // /player/1001
let name = localStorage.getItem("playerName");
let gameId = localStorage.getItem("gameId");
let playerId = localStorage.getItem("playerId");

// Als geen info → foutmelding
if (!joinId && (!gameId || !name)) {
    document.body.innerHTML = `
        <div style="text-align:center; margin-top:100px;">
            <h2>❌ Sessie verlopen</h2>
            <p>Scan je QR-code opnieuw!</p>
        </div>
    `;
}

// --- Characters ---
const characters = [
    { name: "Jokie", img: "https://www.efteling.com/nl/-/media/images/kids/karakters/jokie/profielen/700x610-jokie-profiel-large.png?h=610&w=700&la=nl&hash=AFCC6A2C7EE087EFB6405C06EA6976E9" },
    { name: "Jet", img: "https://www.efteling.com/nl/-/media/images/kids/karakters/jokie/profielen/700x670-jet-profiel-large.png?h=610&w=700&la=nl&hash=6C38B23FC7863C21989C5B2F8B960EE4" },
    /* Voeg hier alle andere characters toe */
];

// --- Display random or stored character ---
function setCharacter(char) {
    document.getElementById("chosenImage").src = char.img;
    document.getElementById("chosenName").innerText = char.name;
}

// --- Gallery ---
function openGallery() {
    document.getElementById("galleryOverlay").style.display = "block";
    loadGallery();
}
function closeGallery() { document.getElementById("galleryOverlay").style.display = "none"; }

function loadGallery() {
    fetch("/scores-full")
    .then(res => res.json())
    .then(data => {
        const grid = document.getElementById("galleryGrid");
        grid.innerHTML = "";

        const takenCharacters = (data.players||[]).map(p=>p.character);

        characters.forEach(c => {
            const card = document.createElement("div");
            card.className="character-card";
            card.innerHTML=`<img src="${c.img}"><p>${c.name}</p>`;

            if(takenCharacters.includes(c.name) && c.name !== document.getElementById("chosenName").innerText){
                card.classList.add("disabled");
            } else {
                card.onclick = ()=>chooseCharacter(c);
            }

            grid.appendChild(card);
        });
    });
}

// --- Choose character ---
function chooseCharacter(c) {
    fetch("/join", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            gameId: gameId,
            name: name,
            character: c.name,
            playerId: playerId
        })
    }).then(res=>res.json())
    .then(data=>{
        if(!data.success){ alert(data.error); return; }
        setCharacter(c);
        closeGallery();
    });
}

// --- Help button ---
document.getElementById("helpBtn").onclick = ()=> {
    document.getElementById("helpOverlay").style.display="block";
};
function closeHelp() {
    document.getElementById("helpOverlay").style.display="none";
}

// --- Close gallery button ---
document.getElementById("closeGallery").addEventListener("click",closeGallery);

// --- Socket updates ---
socket.on("gameUpdate",(payload)=>{
    if(payload.type==="playersUpdate") loadGallery();
});

// --- Start ---
window.addEventListener("load",()=>{
    setCharacter(characters[Math.floor(Math.random()*characters.length)]);
});
</script>

</body>
</html>
