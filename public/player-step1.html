<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Game Join</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="step1">
    <h1>🎢 Vul de Game-ID in</h1>
    <form id="gameIdForm">
        <input type="text" id="gameId" placeholder="Bijv. EFTEL-1234" required>
        <button type="submit">Volgende</button>
    </form>
    <p id="errorMsg"></p>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const autoGameId = params.get("gameId");

if (autoGameId === "EFTEL-123456") {
    localStorage.setItem("gameId", autoGameId);
    window.location.href = "/player-step2.html";
}

document.addEventListener("DOMContentLoaded", function () {

    const MANUAL_GAME_ID = "EFTEL-123456";

    const form = document.getElementById("gameIdForm");
    const input = document.getElementById("gameId");
    const error = document.getElementById("errorMsg");

    form.addEventListener("submit", function (e) {
        e.preventDefault();

        const id = input.value.trim();

        if (id !== MANUAL_GAME_ID) {
            error.innerText = "❌ Ongeldige Game-ID!";
            return;
        }

        localStorage.setItem("gameId", MANUAL_GAME_ID);
        window.location.href = "/player-step2.html";
    });

});

</script>

</body>
</html>
