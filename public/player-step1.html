<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game ID</title>
</head>
<body>

<h1>Voer Game ID in</h1>

<input id="gameId" placeholder="EFTEL-123456">
<button onclick="next()">Volgende</button>

<p id="error"></p>

<script>

if (!localStorage.getItem("playerId")) {
    localStorage.setItem("playerId", crypto.randomUUID());
}

function next() {
    const id = document.getElementById("gameId").value.trim();

    if (id !== "EFTEL-123456") {
        document.getElementById("error").innerText = "Ongeldige Game ID";
        return;
    }

    localStorage.setItem("gameId", id);
    window.location.href = "/player-step2.html";
}

</script>

</body>
</html>
