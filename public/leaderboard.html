<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>
<link rel="stylesheet" href="/style.css">

<style>
#playersList{
display:flex;
flex-direction:column;
gap:10px;
margin-top:20px;
}

.playerRow{
display:flex;
align-items:center;
gap:12px;
background:rgba(255,255,255,0.15);
padding:10px;
border-radius:10px;
}

.playerRow img{
width:40px;
height:40px;
object-fit:contain;
}

.playerName{
font-size:18px;
font-weight:bold;
}
</style>

</head>

<body>

<div id="joinInfo">

<h2>Hoe joinen?</h2>
<p>
Ga naar:<br>
<b>tinyurl.com/EftelingQuiz</b><br>
en scan je QR-code
</p>

<h2>Jouw QR-code</h2>
<div id="myQR"></div>

<h2>Spelers</h2>
<div id="playersList"></div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

function renderQR(joinId){

const qrDiv = document.getElementById("myQR");

qrDiv.innerHTML = `
<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://efteling-kahoot-pro.onrender.com/player/${joinId}">
`;

}

function renderPlayers(players){

const list = document.getElementById("playersList");
list.innerHTML="";

players.forEach(p=>{

const row=document.createElement("div");
row.className="playerRow";

row.innerHTML=`
<img src="${p.characterImg || ''}">
<div class="playerName">${p.name}</div>
`;

list.appendChild(row);

});

}

socket.on("gameUpdate",(payload)=>{

if(payload.type==="playersUpdate"){

renderPlayers(payload.data.players);

}

});

fetch("/scores-full")
.then(res=>res.json())
.then(data=>{

renderPlayers(data.players);

if(data.players.length>0){
renderQR(data.players[0].joinId);
}

});

</script>

</body>
</html>
