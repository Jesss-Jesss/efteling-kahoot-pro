<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>
<link rel="stylesheet" href="/style.css">

<style>

body{
font-family:Arial;
text-align:center;
padding:20px;
}

.section{
margin-bottom:30px;
padding-bottom:20px;
border-bottom:2px solid rgba(255,255,255,0.3);
}

#qrContainer{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}

.qrCard{
background:rgba(255,255,255,0.15);
padding:15px;
border-radius:12px;
width:220px;
}

.qrCard img{
width:180px;
height:180px;
}

.qrName{
margin-top:10px;
font-weight:bold;
font-size:18px;
}

#playersList{
display:flex;
flex-direction:column;
gap:10px;
margin-top:20px;
}

.playerRow{
display:flex;
align-items:center;
gap:12px;
background:rgba(255,255,255,0.15);
padding:10px;
border-radius:10px;
justify-content:center;
}

.playerRow img{
border-radius:8px;
object-fit:contain;
}

.playerName{
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="section">
<h2>Hoe joinen?</h2>
<p>
Ga naar:<br>
<b>tinyurl.com/EftelingQuiz</b><br>
of scan jouw QR-code
</p>
</div>

<div class="section">
<h2>QR-codes</h2>
<div id="qrContainer"></div>
</div>

<div class="section">
<h2>Gejoinde spelers</h2>
<div id="playersList"></div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const allPlayers = [
{ name:"Jestin", joinId:1001 },
{ name:"Luca", joinId:1002 },
{ name:"Jules", joinId:1003 },
{ name:"Levi", joinId:1004 },
{ name:"Bink", joinId:1005 },
{ name:"Symen", joinId:1006 }
];

function renderQR(joinedPlayers){

const qrContainer = document.getElementById("qrContainer");
qrContainer.innerHTML = "";

allPlayers.forEach(player=>{

const alreadyJoined = joinedPlayers.find(p=>p.name===player.name);

if(alreadyJoined) return;

const card = document.createElement("div");
card.className = "qrCard";

card.innerHTML = `
<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://efteling-kahoot-pro.onrender.com/player/${player.joinId}">
<div class="qrName">${player.name}</div>
`;

qrContainer.appendChild(card);

});

}

const characterMap = {
"Roodkapje":"https://www.efteling.com/nl/-/media/images/kids/karakters/sprookjesboom/profielen/700x610-roodkapje-profiel.png",
"Jokie":"https://www.efteling.com/nl/-/media/images/kids/karakters/jokie/profielen/700x610-jokie-profiel-large.png",
"Pardoes":"https://www.efteling.com/nl/-/media/images/kids/karakters/pardoes/profielen/700x610-pardoes-profiel.png"
};
  
function renderPlayers(players){

const list = document.getElementById("playersList");
list.innerHTML = "";

players.forEach(p=>{

const row = document.createElement("div");
row.className = "playerRow";

row.innerHTML = `
<img src="${characterMap[p.character] || ''}" style="width:50px;height:50px;">
<div class="playerName">${p.name}</div>
`;

list.appendChild(row);

});

}

function updateEverything(players){

renderPlayers(players);
renderQR(players);

}

socket.on("gameUpdate",(payload)=>{

if(payload.type==="playersUpdate"){

updateEverything(payload.data.players);

}

});

function loadLeaderboard(){

fetch("/scores-full")
.then(res=>res.json())
.then(data=>{
updateEverything(data.players);
});

}

loadLeaderboard();
setInterval(loadLeaderboard,1000);

</script>

</body>
</html>
