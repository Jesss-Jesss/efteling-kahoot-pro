<!DOCTYPE html>
<html>
<head>
<title>Start Quiz</title>
</head>
<body>

<h1>🎮 Quiz Starten</h1>

<input type="text" id="gameId" placeholder="Voer Game ID in">
<br><br>

<button onclick="startQuiz()">Quiz Starten</button>

<script>

function startQuiz() {

    const gameId = document.getElementById("gameId").value;

    fetch("/api/start-quiz", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ gameId })
    })
    .then(res => res.json())
    .then(data => {

        if (data.error) {
            alert(data.error);
            return;
        }

        // ✅ Ga automatisch naar dashboard
        window.location.href = "/host";
    });

}

</script>

</body>
</html>
